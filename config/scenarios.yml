metadata:
  project: "French Labour Cost Lab"
  country: "France"
  version: "0.1.0"
  note: "V1 uses stylized assumptions. Future versions will use official Mon-entreprise calculations."

baseline:
  monthly_smic_gross: 1801.80
  min_smic_multiple: 0.8
  max_smic_multiple: 3.5
  step_smic_multiple: 0.01

assumptions:
  employee_contribution_rate: 0.22
  employer_contribution_rate_above_relief: 0.42
  employer_contribution_rate_at_smic: 0.08
  relief_end_smic_multiple: 1.6